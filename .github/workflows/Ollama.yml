name: 🔍 Code Check

on:
  pull_request:

jobs:
  ollama_review:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Pull Request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚡ Restore Ollama Cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-model-${{ runner.os }}-deepseek-coder-v2
          restore-keys: |
            ollama-model-${{ runner.os }}-

      - name: ⬇️ Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | bash
          ollama --version

      - name: 🚀 Pull Model if Missing
        run: |
          if [ ! -f ~/.ollama/models/deepseek-coder-v2 ]; then
            ollama pull deepseek-coder-v2
          else
            echo "Model already cached!"
          fi

      - name: 🔍 Review Changed Files
        run: |
          for file in $(git diff --name-only origin/main); do
            if [ -f "$file" ]; then
              content=$(jq -Rs . < "$file")
              ollama run deepseek-coder-v2 "Summarize this file: $content"
            fi
          done
