name: 🔍 Code Check & Caching Primes

on:
  pull_request:
  push:

jobs:
  ollama_review:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Pull Request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚡ Restore Ollama Cache
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-model-${{ runner.os }}
          restore-keys: |
            ollama-model-${{ runner.os }}

      - name: ⬇️ Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | bash
          ollama --version

      - name: 🚀 Pull Model if Missing
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          ollama pull deepseek-coder-v2
      
      - name: 🔍 Review Changed Files
        run: |
          for file in $(git diff --name-only origin/main); do
            if [ -f "$file" ]; then
              content=$(jq -Rs . < "$file")
              ollama run deepseek-coder-v2 "Summarize this file: $content"
            fi
          done
