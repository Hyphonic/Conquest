name: 🔍 Code Check

on:
  pull_request:

permissions:
  contents: write

jobs:
  ollama_review:
    runs-on: ubuntu-latest
    name: 🦙 Ollama Code Review Job
    steps:
      - name: ⬇️ Checkout Pull Request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: ⬇️ Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | bash
          ollama
          ollama pull deepseek-coder-v2
          ollama list
          sleep 5

      - name: 🔍 Review Changed Files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl http://127.0.0.1:11434/api/generate -d '{"model": "deepseek-coder-v2", "prompt": "Hello", "stream": false}'
          echo "" > Review.txt
          # Loop through files changed in the PR
          for file in $(git diff --name-only origin/main); do
            if [ -f "$file" ]; then
              # Read and escape file content
              escaped_content=$(jq -Rs '.' < "$file")
              content=$(cat "$file")  # Original raw content for display

              # Log Prompt message explicitly
              echo "❇️ Prompt: Review the following code: \`$content\`"

              # Send Prompt and Content to Ollama API
              api_response=$(curl -s http://127.0.0.1:11434/api/generate -d "{
                \"model\": \"deepseek-coder-v2\",
                \"prompt\": \"Review the following code:\n\n$escaped_content\",
                \"stream\": false
              }")
              echo "API Response: $api_response"
              modified_file_review=$(echo "$api_response" | jq -r '.response')

              # Prepare comment
              Comment="Ollama Code Review for \`$file\`:\n\n$modified_file_review"
              echo "$Comment" >> Review.txt
              echo "$Comment"
            else
              echo "File $file does not exist or is not a regular file."
            fi
          done
        shell: bash
