name: 🔍 Code Check

on:
  pull_request:

permissions:
  contents: write

jobs:
  ollama_review:
    runs-on: ubuntu-latest
    name: 🦙 Ollama Code Review Job
    steps:
      - name: ⬇️ Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | bash
          ollama
          ollama pull codegemma
      - name: 📩 Retrieve Changed Files
        id: modified
        uses: tj-actions/changed-files@v45
      - name: 🔍 Review Changed Files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in ${{ steps.modified.outputs.all_changed_files }}; do
            echo $file
            cat $file
            modified_file_review=$(curl -s http://127.0.0.1:11434/api/generate -d '{"model": "${{ inputs.llm-model }}", "prompt": "Review the following file:\n\n```\n$(cat $file)\n```\n\nYou may use Markdown.", "stream": false}' | jq -r '.response')
            Comment="Ollama Code Review for \`$file\`:\n\n$modified_file_review"
            echo "$Comment" >> Review.txt
            echo "$Comment"
          done
          gh pr comment ${{ github.event.pull_request.number }} --body "$(cat Review.txt)"
        shell: bash
