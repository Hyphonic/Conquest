name: Build Resourcepack

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  File: Conquest-${{ github.run_id }}.zip

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Zip Folder
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          filename: ${{ env.File }}

      - name: Upload Release
        uses: ncipollo/release-action@v1.12.0
        with:
          artifacts: ${{ env.File }}
          token: ${{ secrets.GITHUB_TOKEN }}
