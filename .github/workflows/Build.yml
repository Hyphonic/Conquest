name: Optimize resource pack
on:
  workflow_dispatch:
  push:
    branches: main
# This permissions section explicitly gives the workflow permission to create releases.
# Most of the time it's not needed to set it, as the default GITHUB_TOKEN permissions
# are permissive enough, but that's not always the case
permissions:
  contents: write
jobs:
  packsquash_32x:
    name: Optimize 32x resource pack
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # A non-shallow repository clone is required
      - name: Run PackSquash 32x
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest-unstable
          options: |
            pack_directory = '.'
            output_file_path = '/tmp/Conquest32.zip'
            allow_mods = ['OptiFine', 'Minecraft Transit Railway 3']    # Optifine and Custom Models
            zip_spec_conformance_level = 'high'                         # Changed to 'high' because 'disregard' broke it
            spooling_buffers_size = 512                                 # Mb
            threads = 16                                                # I don't know the CPU Cores 😓
            zip_compression_iterations = 20                             # Max clamped value
            ['**/*?.ogg']
            ogg_obfuscation = true
            ['**/*?.png']
            image_data_compression_iterations = 40
      - name: Tag and create release for 32x
        uses: softprops/action-gh-release@v2
        with:
          tag_name: action-v${{ github.run_number }}
          files: /tmp/Conquest32.zip
          draft: true

  packsquash_16x:
    name: Optimize 16x resource pack
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # A non-shallow repository clone is required
      - name: Downscale to 16x
        run: |
          find assets/minecraft/textures -type f -name '*.png' -exec mogrify -resize 50% {} \;
      - name: Run PackSquash 16x
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest-unstable
          options: |
            pack_directory = '.'
            output_file_path = '/tmp/Conquest16.zip'
            allow_mods = ['OptiFine', 'Minecraft Transit Railway 3']    # Optifine and Custom Models
            zip_spec_conformance_level = 'high'                         # Changed to 'high' because 'disregard' broke it
            spooling_buffers_size = 512                                 # Mb
            threads = 16                                                # I don't know the CPU Cores 😓
            zip_compression_iterations = 20                             # Max clamped value
            ['**/*?.ogg']
            ogg_obfuscation = true
            ['**/*?.png']
            image_data_compression_iterations = 40
      - name: Tag and create release for 16x
        uses: softprops/action-gh-release@v2
        with:
          tag_name: action-v${{ github.run_number }}
          files: /tmp/Conquest16.zip
          draft: true

  finalize-release:
    needs: [packsquash_32x, packsquash_16x]
    runs-on: ubuntu-latest
    steps:
      - name: Publish Release
        run: |
          gh release upload action-v${{ github.run_number }} /tmp/Conquest32.zip /tmp/Conquest16.zip --clobber --draft=false
      - name: Get Release Sizes
        id: get_sizes
        run: |
          curl -L -o release32.zip https://github.com/${{ github.repository }}/releases/latest/download/Conquest32.zip
          curl -L -o release16.zip https://github.com/${{ github.repository }}/releases/latest/download/Conquest16.zip
          size32=$(du -m release32.zip | cut -f1)
          size16=$(du -m release16.zip | cut -f1)
          echo "size32=$size32 MB" >> $GITHUB_ENV
          echo "size16=$size16 MB" >> $GITHUB_ENV
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_ENV
      - uses: actions/checkout@v2
      - name: Discord Webhook Action
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          embed-title: New Release 🔔
          embed-url: https://github.com/${{ github.repository }}
          embed-color: 3535423
          embed-description: |
            ### Commit ⚡
            Message » `${{ github.event.head_commit.message }}`
            Commit SHA » `${{ github.sha }}`
            Commit Author » `${{ github.event.head_commit.author.name }}`
            ### Workflow ☢️
            Runner OS » `${{ runner.os }}`
            Branch » `${{ env.branch }}`
            ### Release 📦
            Download » [Click here to download 32x⏬](https://github.com/${{ github.repository }}/releases/latest/download/Conquest32.zip)
            Size » `${{ env.size32 }}`
            Download » [Click here to download 16x⏬](https://github.com/${{ github.repository }}/releases/latest/download/Conquest16.zip)
            Size » `${{ env.size16 }}`
            Version » `1.21.1`
