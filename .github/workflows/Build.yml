name: Optimize resource pack
on:
  workflow_dispatch:
# This permissions section explicitly gives the workflow permission to create releases.
# Most of the time it's not needed to set it, as the default GITHUB_TOKEN permissions
# are permissive enough, but that's not always the case
permissions:
  contents: write
jobs:
  packsquash:
    name: Optimize resource pack
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # A non-shallow repository clone is required
      - name: Run PackSquash
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest
          options: |
            pack_directory = '.'
            recompress_compressed_files = true
            zip_compression_iterations = 255
            zip_spec_conformance_level = 'disregard'
            size_increasing_zip_obfuscation = true
            percentage_of_zip_structures_tuned_for_obfuscation_discretion = 100
            never_store_squash_times = true
            spooling_buffers_size = 7629
            allow_mods = ['OptiFine']
            output_file_path = '/tmp/Conquest-${{ github.run_id }}.zip'
          
            [options.audio_files]
            transcode_ogg = true
            ogg_obfuscation = true
          
            [options.json_files]
            minify_json = true
            delete_bloat_keys = false
          
            [options.image_files]
            image_data_compression_iterations = 255
            color_quantization_target = 'none'
            maximum_width_and_height = 2048
          
            [options.shader_files]
            shader_source_transformation_strategy = 'minify'
          
            [options.legacy_language_files]
            minify_legacy_language = true
          
            [options.properties_files]
            minify_properties = true
      - name: Tag and create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: action-v${{ github.run_number }}
          files: /tmp/Conquest-${{ github.run_id }}.zip
