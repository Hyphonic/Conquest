name: Optimize resource pack

on:
  workflow_dispatch:
  push:
    branches: main

permissions:
  contents: write

jobs:
  # Upgrade resource pack
  upgrade_pack:
    name: 🔄 Upgrade Resource Pack
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🔄 Upgrade resource pack
        uses: AshleyThew/minecraft-resource-pack-upgrader@v1.1.2
        with:
          input_path: 'path/to/source/resourcepack'
      - name: 🗃️ Save upgraded resource pack
        run: |
          mkdir -p artifacts
          mv upgraded_resourcepack.zip artifacts/upgraded_resourcepack.zip
      - name: 📦 Upload upgraded artifact
        uses: actions/upload-artifact@v4
        with:
          name: upgraded-resourcepack
          path: artifacts/upgraded_resourcepack.zip

  # Optimize 32x original
  packsquash_32x:
    name: 🗜️ Optimize 32x resource pack
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🗜️ Run PackSquash 32x
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest-unstable
          artifact_name: 'Conquest32'
          options: |
            pack_directory = '.'
            output_file_path = '/tmp/Conquest32.zip'
            allow_mods = ['OptiFine', 'Minecraft Transit Railway 3']
            zip_spec_conformance_level = 'high'
            spooling_buffers_size = 512
            threads = 16
            zip_compression_iterations = 20
            ['**/*?.ogg']
            ogg_obfuscation = true
            ['**/*?.png']
            image_data_compression_iterations = 40

  # Optimize 16x original
  packsquash_16x:
    name: 🗜️ Optimize 16x resource pack
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 📉 Downscale to 16x
        run: |
          find assets/minecraft/textures -type f -name '*.png' -exec mogrify -resize 50% {} \;
      - name: 🗜️ Run PackSquash 16x
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest-unstable
          artifact_name: 'Conquest16'
          options: |
            pack_directory = '.'
            output_file_path = '/tmp/Conquest16.zip'
            allow_mods = ['OptiFine', 'Minecraft Transit Railway 3']
            zip_spec_conformance_level = 'high'
            spooling_buffers_size = 512
            threads = 16
            zip_compression_iterations = 20
            ['**/*?.ogg']
            ogg_obfuscation = true
            ['**/*?.png']
            image_data_compression_iterations = 40

  # Optimize upgraded 32x
  packsquash_upgraded_32x:
    name: 🗜️ Optimize Upgraded 32x resource pack
    needs: upgrade_pack
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download upgraded resource pack
        uses: actions/download-artifact@v4
        with:
          name: upgraded-resourcepack
          path: /tmp
      - name: 📂 Extract upgraded resource pack
        run: unzip /tmp/upgraded_resourcepack.zip -d upgraded_32x
      - name: 🗜️ Run PackSquash Upgraded 32x
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest-unstable
          artifact_name: 'Conquest32-Upgraded'
          options: |
            pack_directory = 'upgraded_32x'
            output_file_path = '/tmp/Conquest32-Upgraded.zip'
            allow_mods = ['OptiFine', 'Minecraft Transit Railway 3']
            zip_spec_conformance_level = 'high'
            spooling_buffers_size = 512
            threads = 16
            zip_compression_iterations = 20
            ['**/*?.ogg']
            ogg_obfuscation = true
            ['**/*?.png']
            image_data_compression_iterations = 40

  # Optimize upgraded 16x
  packsquash_upgraded_16x:
    name: 🗜️ Optimize Upgraded 16x resource pack
    needs: upgrade_pack
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download upgraded resource pack
        uses: actions/download-artifact@v4
        with:
          name: upgraded-resourcepack
          path: /tmp
      - name: 📂 Extract upgraded resource pack
        run: unzip /tmp/upgraded_resourcepack.zip -d upgraded_16x
      - name: 📉 Downscale upgraded to 16x
        run: |
          find upgraded_16x/assets/minecraft/textures -type f -name '*.png' -exec mogrify -resize 50% {} \;
      - name: 🗜️ Run PackSquash Upgraded 16x
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest-unstable
          artifact_name: 'Conquest16-Upgraded'
          options: |
            pack_directory = 'upgraded_16x'
            output_file_path = '/tmp/Conquest16-Upgraded.zip'
            allow_mods = ['OptiFine', 'Minecraft Transit Railway 3']
            zip_spec_conformance_level = 'high'
            spooling_buffers_size = 512
            threads = 16
            zip_compression_iterations = 20
            ['**/*?.ogg']
            ogg_obfuscation = true
            ['**/*?.png']
            image_data_compression_iterations = 40

  # Finalize release
  finalize-release:
    name: 🚀 Finalize Release
    needs: [packsquash_32x, packsquash_16x, packsquash_upgraded_32x, packsquash_upgraded_16x]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp
      - name: 📦 Create Release
        uses: svenstaro/upload-release-action@2.9.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.run_id }}
          file: /tmp/*.zip
          file_glob: true
          draft: false
          prerelease: false
          release_name: ${{ github.event.head_commit.message }}

  # Send webhook
  send-webhook:
    name: 📡 Send Webhook
    needs: finalize-release
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download Latest Release
        run: |
          curl -L -o /tmp/Conquest32.zip https://github.com/${{ github.repository }}/releases/latest/download/Conquest32.zip
          curl -L -o /tmp/Conquest16.zip https://github.com/${{ github.repository }}/releases/latest/download/Conquest16.zip
          curl -L -o /tmp/Conquest32-Upgraded.zip https://github.com/${{ github.repository }}/releases/latest/download/Conquest32-Upgraded.zip
          curl -L -o /tmp/Conquest16-Upgraded.zip https://github.com/${{ github.repository }}/releases/latest/download/Conquest16-Upgraded.zip
      - name: 📏 Get Release Sizes
        id: get_sizes
        run: |
          size32=$(du -m /tmp/Conquest32.zip | cut -f1)
          echo "size32=$size32 MB" >> $GITHUB_ENV
          size16=$(du -m /tmp/Conquest16.zip | cut -f1)
          echo "size16=$size16 MB" >> $GITHUB_ENV
          size32_upgraded=$(du -m /tmp/Conquest32-Upgraded.zip | cut -f1)
          echo "size32_upgraded=$size32_upgraded MB" >> $GITHUB_ENV
          size16_upgraded=$(du -m /tmp/Conquest16-Upgraded.zip | cut -f1)
          echo "size16_upgraded=$size16_upgraded MB" >> $GITHUB_ENV
      - name: 🌿 Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_ENV
      - name: 🔍 Extract version from pack.mcmeta
        id: extract_version
        run: |
          version=$(grep -oP '"description":"\\u00A77\[\u00A76\\u00A7n\K[0-9.]+(?=\\u00A77])' pack.mcmeta)
          echo "version=$version" >> $GITHUB_ENV
      - name: 🔔 Discord Webhook Action
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL_DISABLED }}
          embed-title: New Release 🔔
          embed-url: https://github.com/${{ github.repository }}
          embed-color: 3535423
          embed-description: |
            ### Commit ⚡
            Message » `${{ github.event.head_commit.message }}`
            Commit Author » `${{ github.event.head_commit.author.name }}`
            ### Release 📦
            Download » [Click here to download 32x⏬](https://github.com/${{ github.repository }}/releases/latest/download/Conquest32.zip)
            Size » `${{ env.size32 }}`
            Download » [Click here to download 16x⏬](https://github.com/${{ github.repository }}/releases/latest/download/Conquest16.zip)
            Size » `${{ env.size16 }}`
            Version » `${{ env.version }}`
