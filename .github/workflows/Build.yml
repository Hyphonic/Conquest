name: Build Resourcepack
on:
 push:
   branches: main
 workflow_dispatch:

env:
  File: Conquest ${{ GITHUB_RUN_ID }}.zip
   
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Zip Folder
      - uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          filename: $File
      - name: Upload Release
        uses: ncipollo/release-action@v1.12.0
        with:
          artifacts: $File
          token: ${{ secrets.GITHUB_TOKEN }}
